server:
  port: 8083

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5434/notifications_db?TimeZone=Asia/Kolkata
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SELECT 1

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-service-group
      auto-offset-reset: earliest

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:}
    password: ${GMAIL_APP_PASSWORD:}
    properties:
      mail:
        smtp:
          starttls:
            enable: true
          auth: true
          timeout: 10000
          connection-timeout: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always

notification:
  # In dev: set to ${GMAIL_USERNAME} to route all emails to your own inbox.
  # In production: leave empty — UserServiceClient resolves real user emails.
  dev-recipient: ${GMAIL_USERNAME:}

services:
  user-service:
    url: http://localhost:8081

logging:
  level:
    com.syncvault.notificationservice: DEBUG
